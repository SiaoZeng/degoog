[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
user=root

[program:searxng]
command=python -m searx.webapp
directory=/searxng
environment=SEARXNG_SETTINGS_PATH="/etc/searxng/settings.yml"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startsecs=3
priority=10

[program:degoog]
command=bun run src/server/index.ts
directory=/app
environment=DEGOOG_PORT="8082"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startsecs=5
priority=20

services:
  degoog:
    build:
      context: .
      dockerfile: Dockerfile.combined
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      - PUID=1000
      - PGID=1000
      - DEGOOG_PORT=8082
      - SEARXNG_PORT=8888
      - SEARXNG_BIND_ADDRESS=127.0.0.1
      - SEARXNG_SECRET=degoog-searxng-local
      - SEARXNG_IMAGE_PROXY=true
    restart: unless-stopped
